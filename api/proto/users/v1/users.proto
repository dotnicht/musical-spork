syntax = "proto3";

package api.users.v1;

option go_package = "example.com/modmonolith/api/gen/users/v1;usersv1";

service UsersService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string created_at_rfc3339 = 4;
  string updated_at_rfc3339 = 5;
}

message CreateUserRequest {
  string email = 1;
  string name = 2;
}
message CreateUserResponse { string id = 1; }

message GetUserRequest { string id = 1; }
message GetUserResponse { User user = 1; }

message ListUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
}
message ListUsersResponse { repeated User users = 1; }

message UpdateUserRequest {
  string id = 1;
  optional string email = 2;
  optional string name = 3;
}
message UpdateUserResponse {}

message DeleteUserRequest { string id = 1; }
message DeleteUserResponse {}
